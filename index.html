<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人用藥管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
    <header class="mb-8 border-b pb-4 border-slate-200">
        <h1 class="text-2xl font-bold text-slate-900">個人用藥管理中心</h1>
        <nav class="mt-4 flex gap-4">
            <button onclick="showSection('daily')" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium shadow">一日規劃</button>
            <button onclick="showSection('weekly')" class="px-4 py-2 bg-white text-slate-600 border border-slate-300 rounded-lg">一週概覽</button>
            <button onclick="showSection('family')" class="px-4 py-2 bg-white text-slate-600 border border-slate-300 rounded-lg">親友管理</button>
        </nav>
    </header>

    <main id="content">
        <!-- 內容區塊會動態切換 -->
    </main>
</div>

<script>
const medicationData = {
    "早餐後": ["維他命 B 群", "葉黃素", "魚油"],
    "午餐後": ["骨科止痛消炎藥", "肌肉鬆弛劑 (備用)"],
    "晚餐後": ["高血壓藥", "維康肝藥"],
    "夜間睡前": ["妥寧 (Atorvastatin)"]
};

function showSection(section) {
    const container = document.getElementById('content');
    if (section === 'daily') {
        let html = '<h2 class="text-xl font-semibold mb-4">今日用藥清單</h2><div class="grid gap-4">';
        for (const [time, meds] of Object.entries(medicationData)) {
            html += `<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                        <h3 class="font-bold text-blue-700">${time}</h3>
                        <ul class="mt-2 text-slate-600">${meds.map(m => `<li>• ${m}</li>`).join('')}</ul>
                     </div>`;
        }
        container.innerHTML = html + '</div>';
    } else if (section === 'family') {
        container.innerHTML = `
            <h2 class="text-xl font-semibold mb-4">親友管理</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <input type="text" placeholder="親友姓名" class="w-full p-2 border rounded mb-2">
                <button onclick="generateLink()" class="w-full py-2 bg-teal-600 text-white rounded-lg">產生專屬連結並複製</button>
                <div id="linkOutput" class="mt-4 p-3 bg-slate-100 rounded text-sm text-slate-500 break-all hidden"></div>
            </div>`;
    } else {
        container.innerHTML = '<h2 class="text-xl font-semibold">一週概覽</h2><p class="text-slate-500 mt-2">整合中...</p>';
    }
}

function generateLink() {
    const link = "https://your-med-app.github.io/family-view/" + Math.random().toString(36).substr(2, 9);
    const output = document.getElementById('linkOutput');
    output.innerText = "連結已產生：" + link;
    output.classList.remove('hidden');
    navigator.clipboard.writeText(link);
}

// 初始化
showSection('daily');
</script>
</body>
</html>
