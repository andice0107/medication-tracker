<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>頤寧 - 智能用藥提醒與日程面板</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="頤寧用藥">
  <meta name="mobile-web-app-capable" content="yes">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc',
              500: '#334e68', 600: '#243b53', 700: '#102a43', 800: '#0c1b2a',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    :root {
      --fluid-title: clamp(1.1rem, 3.5vw, 1.8rem);
      --fluid-subtitle: clamp(1rem, 2.5vw, 1.4rem);
      --fluid-body: clamp(1.05rem, 2.2vw, 1.35rem);
      --fluid-meta: clamp(0.95rem, 2vw, 1.15rem);
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f0f4f8;
      font-size: var(--fluid-body);
      -webkit-user-select: none;
    }
    input, select, textarea {
      user-select: text !important;
      -webkit-user-select: text !important;
      pointer-events: auto !important;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .animate-fade { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-900 antialiased min-h-screen flex flex-col pb-safe w-full overflow-x-hidden">

  <header class="bg-brand-800 text-white shadow-md sticky top-0 z-40 w-full py-2">
    <div class="w-full px-3 sm:px-4 flex flex-row justify-between items-center gap-2">
      <div class="flex items-center gap-2">
        <div class="bg-emerald-500 p-1.5 rounded-xl shadow-inner">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <div>
          <div class="flex items-center gap-1.5">
            <h1 class="text-sm sm:text-base font-black tracking-wide text-white leading-none">頤寧個人用藥</h1>
            <span id="cloudStatusBadge" class="text-[9px] bg-emerald-500 text-white px-1 rounded font-bold">同步中</span>
          </div>
          <p class="text-[9px] text-slate-400 mt-0.5 leading-none" id="subTitleDisplay">戴漢彬 專屬監控面板</p>
        </div>
      </div>
      
      <nav class="bg-brand-700 p-0.5 rounded-xl flex gap-0.5 border border-brand-600">
        <button type="button" id="btnDayView" onclick="window.switchView('day')" class="px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-lg font-black text-xs sm:text-sm transition-all bg-emerald-50 text-emerald-900 shadow-md">📅 一日流程</button>
        <button type="button" id="btnWeekView" onclick="window.switchView('week')" class="px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-lg font-black text-xs sm:text-sm transition-all text-slate-300 hover:text-white">🗓️ 打卡紀錄</button>
        <button type="button" id="btnEditView" onclick="window.switchView('edit')" class="px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-lg font-black text-xs sm:text-sm transition-all text-slate-300 hover:text-white">⚙️ 規劃編輯</button>
      </nav>
    </div>
  </header>

  <main class="flex-grow w-full px-3 py-4 space-y-4 max-w-full">
    
    <!-- 視圖1: 一日監控 -->
    <div id="dayView" class="space-y-4 w-full animate-fade">
      <div class="bg-gradient-to-br from-brand-700 to-brand-800 rounded-2xl p-4 text-white shadow-md relative overflow-hidden w-full">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 z-10 relative">
          <div>
            <span class="bg-emerald-500 text-white text-[10px] font-black px-2.5 py-0.5 rounded-full uppercase font-bold">LIVE</span>
            <div class="text-3xl sm:text-4xl font-black mt-1 tracking-tight" id="liveClock">00:00:00</div>
            <div class="text-xs sm:text-sm text-slate-300 mt-0.5 font-bold" id="liveDate">--</div>
          </div>
          <div class="text-left md:text-right w-full md:w-auto">
            <span class="text-xs sm:text-sm text-slate-300 block font-bold">下個時段倒數：</span>
            <span class="text-2xl sm:text-3xl font-black text-amber-300 block mt-0.5" id="nextDoseCountdown">--小時--分</span>
          </div>
        </div>
      </div>

      <section class="grid grid-cols-1 lg:grid-cols-3 gap-4 w-full">
        <div class="bg-slate-100 rounded-3xl p-5 border-2 border-slate-200 shadow-sm">
          <h3 class="text-sm font-black text-slate-500 mb-3 border-b border-slate-200 pb-2 flex justify-between">
            <span>⏮️ 上一時段</span><span id="prevSlotTimeTag" class="bg-slate-200 px-2 py-0.5 rounded-full">--:--</span>
          </h3>
          <div id="prevMedList" class="space-y-2"></div>
        </div>

        <div class="bg-white rounded-3xl p-6 border-4 border-emerald-500 shadow-md transform lg:scale-105 z-10 relative">
          <div class="absolute top-0 right-6 transform -translate-y-1/2 bg-emerald-500 text-white text-xs font-black px-4 py-1.5 rounded-full shadow-md">當前應服</div>
          <div class="flex justify-between items-center border-b border-emerald-100 pb-3 mb-4">
            <h3 class="fluid-title text-slate-900 font-black" id="currentSlotNameDisplay">--</h3>
            <span class="fluid-subtitle font-black text-rose-500 bg-rose-50 px-3 py-1.5 rounded-full" id="currentSlotTimeTag">--:--</span>
          </div>
          <div id="currentMedList" class="space-y-3 mb-4"></div>
          <button type="button" onclick="window.markTaken()" id="takeButton" class="w-full h-16 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xl rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
            <span>確認此時段已服藥</span>
          </button>
        </div>

        <div class="bg-slate-100 rounded-3xl p-5 border-2 border-slate-200 shadow-sm">
          <h3 class="text-sm font-black text-slate-500 mb-3 border-b border-slate-200 pb-2 flex justify-between">
            <span>⏭️ 下一時段</span><span id="nextSlotTimeTag" class="bg-slate-200 px-2 py-0.5 rounded-full">--:--</span>
          </h3>
          <div id="nextMedList" class="space-y-2"></div>
        </div>
      </section>
    </div>

    <!-- 視圖2: 一週紀錄 -->
    <div id="weekView" class="hidden space-y-4 w-full animate-fade">
      <div class="bg-white rounded-3xl p-5 shadow-md border border-slate-100">
        <h2 class="fluid-title text-slate-800 font-black border-b border-slate-100 pb-3 mb-4">🗓️ 一週服藥狀態</h2>
        <div class="grid grid-cols-7 gap-2" id="weekGrid"></div>
      </div>
    </div>

    <!-- 視圖3: 編輯規劃 (補齊備份與匯入按鈕) -->
    <div id="editView" class="hidden bg-white rounded-3xl p-5 shadow-md border border-slate-100 space-y-6 w-full animate-fade">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-100 pb-4">
        <div>
          <h2 class="fluid-title text-slate-800 font-black">⚙️ 編輯用藥規劃</h2>
          <p class="text-xs text-slate-500 mt-1">您可以隨時修改內容，或使用按鈕進行備份。</p>
        </div>
        <div class="flex gap-2">
          <button onclick="window.exportData()" class="bg-brand-600 text-white text-xs font-black px-4 py-2.5 rounded-xl shadow-sm hover:bg-brand-500 transition-all">📥 匯出備份</button>
          <label class="bg-slate-200 text-slate-700 text-xs font-black px-4 py-2.5 rounded-xl cursor-pointer hover:bg-slate-300 transition-all">
            📤 載入備份
            <input type="file" class="hidden" accept=".json" onchange="window.importData(event)">
          </label>
        </div>
      </div>

      <div class="space-y-6">
        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200">
          <label class="block text-sm font-black text-slate-600 mb-2">使用者姓名</label>
          <input type="text" id="editUsername" class="w-full h-12 bg-white border border-slate-200 rounded-xl px-4 font-bold focus:ring-2 focus:ring-emerald-500 transition-all">
        </div>

        <div class="space-y-4">
          <div class="flex justify-between items-center">
            <h3 class="fluid-subtitle font-black text-slate-800">時段與藥品設定</h3>
            <button onclick="window.addSlot()" class="bg-emerald-600 text-white text-xs font-black px-3 py-1.5 rounded-lg">+ 新增時段</button>
          </div>
          <div id="editorSlotsContainer" class="space-y-6"></div>
        </div>
      </div>

      <div class="pt-6 border-t border-slate-100 flex gap-3">
        <button onclick="window.switchView('day')" class="flex-1 h-14 rounded-2xl font-bold text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all">取消</button>
        <button onclick="window.saveAll()" class="flex-1 h-14 bg-emerald-600 text-white font-black rounded-2xl shadow-lg hover:bg-emerald-500 transition-all">💾 儲存修改</button>
      </div>
    </div>
  </main>

  <script>
    // 預置戴先生提供的完整規劃資料
    const initialData = {
      "username": "戴漢彬",
      "schedule": [
        {
          "id": "slot-3vbx7brcf", "name": "早餐後", "time": "08:30", "description": "隨餐或飯後30分鐘內",
          "items": [
            { "name": "維他命 B 群", "dosage": "1 顆", "effect": "提供活力" },
            { "name": "葉黃素", "dosage": "1 顆", "effect": "保養黃斑部" },
            { "name": "魚油", "dosage": "2 顆", "effect": "保護心血管" }
          ]
        },
        {
          "id": "slot-vyiblho7v", "name": "午餐後", "time": "12:30", "description": "隨餐或飯後30分鐘內",
          "items": [
            { "name": "骨科止痛消炎藥", "dosage": "1 顆", "effect": "緩解足跟疼痛" },
            { "name": "肌肉鬆弛劑", "dosage": "1 顆", "effect": "放鬆肌肉" }
          ]
        },
        {
          "id": "slot-j9brkk69g", "name": "晚餐後", "time": "18:30", "description": "隨餐或飯後30分鐘內",
          "items": [
            { "name": "高血壓藥", "dosage": "1 顆", "effect": "控制血壓穩定" },
            { "name": "維康肝藥", "dosage": "1 顆", "effect": "水飛薊素" }
          ]
        },
        {
          "id": "slot-kj98ovr7n", "name": "夜間睡前", "time": "22:00", "description": "就寢前30分鐘",
          "items": [
            { "name": "妥寧 (降血脂藥)", "dosage": "半 顆", "effect": "抑制深夜膽固醇合成" },
            { "name": "鈣片", "dosage": "1 顆", "effect": "穩定神經助眠" }
          ]
        },
        {
          "id": "slot-n64cn82j1", "name": "骨科備用藥", "time": "23:59", "description": "若夜間疼痛發作時",
          "items": [
            { "name": "骨科止痛消炎藥", "dosage": "1 顆", "effect": "緩解發炎" },
            { "name": "肌肉鬆弛劑", "dosage": "1 顆", "effect": "改善痙攣" }
          ]
        }
      ],
      "takenLogs": { "2026-05-27": { "slot-j9brkk69g": "20:59", "slot-3vbx7brcf": "17:31", "slot-vyiblho7v": "13:23" } }
    };

    window.appState = JSON.parse(localStorage.getItem('yining_final_v1')) || initialData;
    window.currentView = 'day';

    window.onload = () => {
      initClock();
      renderApp();
    };

    function initClock() {
      setInterval(() => {
        const now = new Date();
        const timeStr = now.toTimeString().split(' ')[0];
        document.getElementById('liveClock').textContent = timeStr;
        document.getElementById('liveDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${['日','一','二','三','四','五','六'][now.getDay()]}`;
        
        // 只有在非編輯模式下才更新倒計時與主畫面渲染，避免打字時介面被刷掉
        if (window.currentView === 'day') {
          updateCountdown();
        }
      }, 1000);
    }

    window.switchView = (view) => {
      window.currentView = view;
      ['dayView', 'weekView', 'editView'].forEach(id => document.getElementById(id).classList.add('hidden'));
      document.getElementById(view + 'View').classList.remove('hidden');
      
      const btnMap = { day: 'btnDayView', week: 'btnWeekView', edit: 'btnEditView' };
      Object.values(btnMap).forEach(id => {
        document.getElementById(id).className = "px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-lg font-black text-xs sm:text-sm transition-all text-slate-300 hover:text-white";
      });
      document.getElementById(btnMap[view]).className = "px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-lg font-black text-xs sm:text-sm transition-all bg-emerald-50 text-emerald-900 shadow-md";

      if (view === 'edit') renderEditor();
      else renderApp();
    };

    function renderApp() {
      document.getElementById('subTitleDisplay').textContent = `${window.appState.username} 專屬監控面板`;
      renderTimeline();
      renderWeekGrid();
    }

    function renderTimeline() {
      const now = new Date();
      const currentMin = now.getHours() * 60 + now.getMinutes();
      const sorted = [...window.appState.schedule].sort((a,b) => timeToMin(a.time) - timeToMin(b.time));
      
      let curIdx = sorted.findIndex(s => timeToMin(s.time) > currentMin);
      if (curIdx === -1) curIdx = sorted.length - 1;
      else curIdx = Math.max(0, curIdx - 1);

      const current = sorted[curIdx];
      const prev = sorted[(curIdx - 1 + sorted.length) % sorted.length];
      const next = sorted[(curIdx + 1) % sorted.length];

      document.getElementById('currentSlotNameDisplay').textContent = current.name;
      document.getElementById('currentSlotTimeTag').textContent = current.time;
      document.getElementById('prevSlotTimeTag').textContent = prev.time;
      document.getElementById('nextSlotTimeTag').textContent = next.time;

      renderMeds('currentMedList', current, true);
      renderMeds('prevMedList', prev, false);
      renderMeds('nextMedList', next, false);
    }

    function renderMeds(id, slot, isMain) {
      const container = document.getElementById(id);
      const todayStr = getTodayStr();
      const takenTime = window.appState.takenLogs[todayStr]?.[slot.id];
      
      if (isMain) {
        const btn = document.getElementById('takeButton');
        if (takenTime) {
          btn.disabled = true;
          btn.classList.replace('bg-emerald-600', 'bg-slate-300');
          btn.textContent = `✅ 已於 ${takenTime} 服用`;
        } else {
          btn.disabled = false;
          btn.classList.replace('bg-slate-300', 'bg-emerald-600');
          btn.textContent = "確認此時段已服藥";
          btn.onclick = () => window.markTaken(slot.id);
        }
      }

      container.innerHTML = slot.items.map(m => `
        <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex justify-between items-start">
          <div>
            <div class="text-sm font-black text-slate-800">${m.name}</div>
            <div class="text-[10px] text-slate-500">${m.effect}</div>
          </div>
          <span class="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">${m.dosage}</span>
        </div>
      `).join('');
    }

    window.exportData = () => {
      const blob = new Blob([JSON.stringify(window.appState, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `頤寧備份_${window.appState.username}.json`;
      a.click();
      showToast("✅ 已匯出備份檔案");
    };

    window.importData = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.schedule) {
            window.appState = data;
            localStorage.setItem('yining_final_v1', JSON.stringify(data));
            renderEditor();
            showToast("✅ 已載入備份規劃");
          }
        } catch (err) { showToast("❌ 格式不正確"); }
      };
      reader.readAsText(file);
    };

    function renderEditor() {
      document.getElementById('editUsername').value = window.appState.username;
      const container = document.getElementById('editorSlotsContainer');
      
      container.innerHTML = window.appState.schedule.map((slot, sIdx) => `
        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5 relative space-y-4">
          <button onclick="window.removeSlot(${sIdx})" class="absolute top-4 right-4 text-rose-500 font-bold text-xs">✕ 刪除時段</button>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-[10px] font-black text-slate-400 block mb-1">時段名</label>
              <input type="text" value="${slot.name}" class="slot-name w-full h-10 border rounded-xl px-3 font-bold text-sm">
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-400 block mb-1">預定時間</label>
              <input type="text" value="${slot.time}" class="slot-time w-full h-10 border rounded-xl px-3 font-bold text-sm">
            </div>
          </div>
          <div class="space-y-2">
            ${slot.items.map((m, mIdx) => `
              <div class="bg-white p-2 border rounded-xl flex gap-2 items-center">
                <input type="text" value="${m.name}" class="item-name flex-grow text-xs font-bold border-none" placeholder="藥名">
                <input type="text" value="${m.dosage}" class="item-dosage w-16 text-xs font-bold border-none" placeholder="劑量">
                <button onclick="window.removeItem(${sIdx}, ${mIdx})" class="text-slate-300 px-2 font-bold">✕</button>
              </div>
            `).join('')}
            <button onclick="window.addItem(${sIdx})" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-[10px] text-slate-400 font-black">+ 新增藥品</button>
          </div>
        </div>
      `).join('');
    }

    window.saveAll = () => {
      const slotEls = document.querySelectorAll('#editorSlotsContainer > div');
      const newSched = [];
      slotEls.forEach(el => {
        const name = el.querySelector('.slot-name').value;
        const time = el.querySelector('.slot-time').value;
        const items = [];
        el.querySelectorAll('.bg-white').forEach(itemEl => {
          items.push({
            name: itemEl.querySelector('.item-name').value,
            dosage: itemEl.querySelector('.item-dosage').value,
            effect: "使用者自行定義"
          });
        });
        newSched.push({ id: 's-'+Math.random(), name, time, items });
      });

      window.appState.username = document.getElementById('editUsername').value;
      window.appState.schedule = newSched;
      localStorage.setItem('yining_final_v1', JSON.stringify(window.appState));
      showToast("💾 設定已儲存");
      window.switchView('day');
    };

    window.addSlot = () => { window.appState.schedule.push({ id: 's-'+Date.now(), name: "新時段", time: "09:00", items: [] }); renderEditor(); };
    window.removeSlot = (i) => { window.appState.schedule.splice(i, 1); renderEditor(); };
    window.addItem = (i) => { window.appState.schedule[i].items.push({ name: "新藥物", dosage: "1 顆", effect: "" }); renderEditor(); };
    window.removeItem = (si, mi) => { window.appState.schedule[si].items.splice(mi, 1); renderEditor(); };

    window.markTaken = (id) => {
      const today = getTodayStr();
      const time = new Date().toTimeString().substring(0, 5);
      if (!window.appState.takenLogs[today]) window.appState.takenLogs[today] = {};
      window.appState.takenLogs[today][id] = time;
      localStorage.setItem('yining_final_v1', JSON.stringify(window.appState));
      renderApp();
      showToast(`✅ 已於 ${time} 完成服用`);
    };

    function timeToMin(t) { const [h,m] = t.split(':').map(Number); return h * 60 + m; }
    function getTodayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    
    function updateCountdown() {
      const now = new Date();
      const curMin = now.getHours() * 60 + now.getMinutes();
      const sorted = [...window.appState.schedule].sort((a,b) => timeToMin(a.time) - timeToMin(b.time));
      let next = sorted.find(s => timeToMin(s.time) > curMin) || sorted[0];
      let diff = timeToMin(next.time) - curMin;
      if (diff <= 0) diff += 1440;
      document.getElementById('nextDoseCountdown').textContent = `${Math.floor(diff/60)}小時 ${diff%60}分`;
    }

    function renderWeekGrid() {
      const container = document.getElementById('weekGrid');
      const today = new Date();
      let html = "";
      for(let i=0; i<7; i++) {
        const d = new Date(); d.setDate(today.getDate() - today.getDay() + (i+1));
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const isToday = d.getDate() === today.getDate();
        html += `
          <div class="bg-slate-50 p-2 rounded-xl border ${isToday?'border-emerald-500':'border-slate-200'} text-center">
            <div class="text-[8px] font-black text-slate-400">${['一','二','三','四','五','六','日'][i]}</div>
            <div class="text-xs font-black ${isToday?'text-emerald-600':''}">${d.getDate()}</div>
            <div class="mt-2 space-y-1">
              ${window.appState.schedule.map(s => `<div class="w-full h-1 rounded-full ${window.appState.takenLogs[ds]?.[s.id]?'bg-emerald-500':'bg-slate-200'}"></div>`).join('')}
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    function showToast(m) {
      const t = document.createElement('div');
      t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-brand-800 text-white px-6 py-3 rounded-full shadow-2xl font-black z-50 animate-fade text-sm";
      t.textContent = m;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
  </script>
</body>
</html>
